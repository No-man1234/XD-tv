<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XD-TV | Minimalist IPTV Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="tv" class="logo-icon"></i>
                    <span>XD-TV</span>
                </div>
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search channels...">
                </div>
            </div>
            
            <div class="filters-wrapper">
                <div class="filters-scroll" id="categoryFilters">
                    <button class="filter-btn active" data-group="All">All</button>
                    <button class="filter-btn" data-group="Favorites" style="display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="star" style="width: 12px; height: 12px;"></i> Favorites
                    </button>
                    <!-- Dynamic categories -->
                </div>
            </div>

            <div class="channels-list" id="channelsList">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading channels...</p>
                </div>
            </div>
        </aside>

        <main class="player-container">
            <div class="player-wrapper">
                <video id="videoPlayer" controls></video>
                <div class="player-overlay" id="playerOverlay">
                    <div class="overlay-content">
                        <i data-lucide="play-circle" class="overlay-icon"></i>
                        <h2>Select a channel</h2>
                        <p>Choose a channel from the sidebar to start watching</p>
                    </div>
                </div>
                <div class="error-overlay hidden" id="errorOverlay">
                    <div class="overlay-content">
                        <i data-lucide="alert-circle" class="overlay-icon error-icon"></i>
                        <h2>Stream Unavailable</h2>
                        <p>This channel is currently offline or unreachable.</p>
                    </div>
                </div>
            </div>
            
            <div class="channel-info hidden" id="channelInfo">
                <img id="currentChannelLogo" src="" alt="Channel Logo" class="current-logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNhMWExYWEiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cmVjdCB4PSIyIiB5PSI3IiB3aWR0aD0iMjAiIGhlaWdodD0iMTUiIHJ4PSIyIiByeT0iMiI+PC9yZWN0Pjxwb2x5bGluZSBwb2ludHM9IjE3IDIgMTIgNyA3IDIiPjwvcG9seWxpbmU+PC9zdmc+'">
                <div class="current-details">
                    <h1 id="currentChannelName">Channel Name</h1>
                    <span class="badge" id="currentChannelGroup">Category</span>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
